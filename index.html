<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Restaurant Menu Hub</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="/restaurant/favicon.ico">
  <link rel="manifest" href="/restaurant/manifest.json">
  <meta name="description" content="Company Restaurant Menu Hub - Browse nearby restaurant menus">
  <meta name="theme-color" content="#1a1a2e" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #ffcc00;
      --primary-hover: #f0b70c;
      --bg-dark: #1a0d0d;
      --bg-card: #2b1515;
      --text-primary: #f8f1d4;
      --text-secondary: #f4d28a;
      --accent: #e80d1d;
      --success: #10b981;
      --warning: #f59e0b;
      --external-badge: #f97316;
      --header-border: rgba(255, 255, 255, 0.05);
      --header-shadow: rgba(0, 0, 0, 0.35);
      --nav-border: rgba(255, 204, 0, 0.3);
      --nav-hover-bg: rgba(255, 204, 0, 0.1);
      --nav-hover-border: rgba(255, 204, 0, 0.7);
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 204, 0, 0.25);
      --card-shadow: rgba(255, 204, 0, 0.35);
      --external-border: rgba(249, 115, 22, 0.35);
      --external-hover-bg: rgba(249, 115, 22, 0.1);
      --map-link-bg: rgba(16, 185, 129, 0.1);
      --map-link-hover: rgba(16, 185, 129, 0.2);
      --overlay-bg: rgba(0, 0, 0, 0.5);
      --home-bg: linear-gradient(160deg, #1a0d0d 0%, #2b1515 70%);
      --welcome-bg: linear-gradient(135deg, rgba(255, 204, 0, 0.25), rgba(232, 13, 29, 0.15));
      --h1-gradient: linear-gradient(135deg, #ffcc00 0%, #e80d1d 100%);
      --spinner-track: rgba(255, 255, 255, 0.1);
      --dropdown-border: rgba(255, 255, 255, 0.1);
      --badge-bg: rgba(255, 204, 0, 0.3);
      --badge-text: #fff8dc;
      --external-badge-bg: rgba(249, 115, 22, 0.3);
      --external-badge-text: #ffb380;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
      border-bottom: 1px solid var(--header-border);
      padding: 12px 16px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 4px 25px var(--header-shadow);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 18px;
      color: var(--text-primary);
    }

    /* Navigation Tabs */
    .nav-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .nav-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding: 4px 0;
      scroll-behavior: smooth;
    }

    .nav-scroll::-webkit-scrollbar {
      display: none;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--nav-border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: var(--nav-hover-bg);
      border-color: var(--nav-hover-border);
      color: var(--text-primary);
    }

    .nav-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--bg-dark);
      box-shadow: 0 6px 18px var(--card-shadow);
    }

    .nav-btn.external {
      border-color: var(--external-badge);
      color: var(--external-badge);
    }

    .nav-btn.external:hover {
      background: var(--external-hover-bg);
    }

    .nav-btn .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      background: var(--external-badge);
      color: white;
    }

    /* Mobile Menu Toggle */
    .menu-toggle {
      display: none;
      background: transparent;
      border: 1px solid var(--nav-border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--nav-border);
      border-radius: 8px;
      padding: 8px 12px;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--nav-hover-bg);
      border-color: var(--nav-hover-border);
    }

    /* Dropdown for mobile */
    .mobile-dropdown {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-bottom: 1px solid var(--dropdown-border);
      padding: 16px;
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      z-index: 999;
    }

    .mobile-dropdown.show {
      display: block;
    }

    .mobile-section {
      margin-bottom: 16px;
    }

    .mobile-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .mobile-nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .mobile-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--nav-border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .mobile-nav-btn:hover {
      background: var(--nav-hover-bg);
    }

    .mobile-nav-btn.active {
      background: var(--primary);
      border-color: var(--primary);
    }

    .mobile-nav-btn.external {
      border-color: var(--external-border);
      color: var(--external-border);
    }

    /* Main Content */
    .main-content {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* Home Page */
    .home-page {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 24px;
      background: var(--home-bg);
    }

    .home-page.active {
      display: block;
    }

    .home-content {
      max-width: 1000px;
      margin: 0 auto;
    }

    .welcome-section {
      text-align: center;
      margin-bottom: 40px;
      padding: 40px 20px;
      background: var(--welcome-bg);
      border-radius: 16px;
      border: 1px solid var(--card-border);
    }

    .welcome-section h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--h1-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-section p {
      color: var(--text-secondary);
      font-size: 16px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .icon {
      font-size: 20px;
    }

    .restaurant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .restaurant-card {
      padding: 16px 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .restaurant-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 4px 20px var(--card-shadow);
    }

    .restaurant-card.external {
      border-color: var(--external-border);
    }

    .restaurant-card.external:hover {
      border-color: var(--external-border);
      box-shadow: 0 4px 20px var(--card-shadow);
    }

    .restaurant-card .name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .restaurant-card .badge {
      display: inline-block;
      margin-top: 8px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--badge-bg);
      color: var(--badge-text);
    }

    .restaurant-card.external .badge {
      background: var(--external-badge-bg);
      color: var(--external-badge-text);
    }

    .map-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--map-link-bg);
      border: 1px solid var(--success);
      border-radius: 8px;
      color: var(--success);
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
      margin-top: 16px;
    }

    .map-link:hover {
      background: var(--map-link-hover);
    }

    /* Iframe Container */
    .iframe-container {
      display: none;
      height: 100%;
    }

    .iframe-container.active {
      display: block;
    }

    .content-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* Loading Indicator */
    .loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-primary);
      background: var(--bg-dark);
      padding: 24px;
      border-radius: 12px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--spinner-track);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .logo-text {
        display: none;
      }

      .nav-container {
        display: none;
      }

      .menu-toggle {
        display: flex;
        margin-left: auto;
      }

      .theme-toggle {
        display: flex;
        margin-left: 8px;
      }

      .welcome-section h1 {
        font-size: 22px;
      }

      .restaurant-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 769px) {
      .mobile-dropdown {
        display: none !important;
      }
    }

    /* Overlay for mobile menu */
    .overlay {
      display: none;
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--overlay-bg);
      z-index: 998;
    }

    .overlay.show {
      display: block;
    }

    [data-theme="light"] {
      --bg-dark: #fff9ee;
      --bg-card: #fff6d1;
      --text-primary: #3c1d00;
      --text-secondary: #a86900;
      --accent: #bb0f12;
      --header-border: rgba(0, 0, 0, 0.08);
      --header-shadow: rgba(0, 0, 0, 0.12);
      --nav-border: rgba(0, 0, 0, 0.12);
      --nav-hover-bg: rgba(255, 204, 0, 0.25);
      --nav-hover-border: rgba(232, 13, 29, 0.4);
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(0, 0, 0, 0.1);
      --card-shadow: rgba(0, 0, 0, 0.15);
      --external-border: rgba(232, 13, 29, 0.4);
      --external-hover-bg: rgba(232, 13, 29, 0.15);
      --map-link-bg: rgba(232, 13, 29, 0.08);
      --map-link-hover: rgba(232, 13, 29, 0.18);
      --overlay-bg: rgba(0, 0, 0, 0.2);
      --home-bg: linear-gradient(160deg, #fff9ee 0%, #ffe4aa 70%);
      --welcome-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 204, 0, 0.4));
      --h1-gradient: linear-gradient(135deg, #e80d1d 0%, #b8860b 100%);
      --spinner-track: rgba(0, 0, 0, 0.1);
      --dropdown-border: rgba(0, 0, 0, 0.1);
      --badge-bg: rgba(232, 13, 29, 0.15);
      --badge-text: #b8860b;
      --external-badge-bg: rgba(232, 13, 29, 0.2);
      --external-badge-text: #c43c00;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">🍽️</div>
        <span class="logo-text">Menu Hub</span>
      </div>

      <nav class="nav-container">
        <div class="nav-scroll" id="nav-tabs"></div>
      </nav>

      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">🌙 Dark</button>

      <button class="menu-toggle" id="menu-toggle" onclick="toggleMobileMenu()">
        <span id="menu-toggle-text">☰ Menu</span>
      </button>
    </div>
  </header>

  <!-- Mobile Dropdown -->
  <div class="mobile-dropdown" id="mobile-dropdown">
    <div class="mobile-section">
      <div class="mobile-section-title">🍽️ Iframe Menus</div>
      <div class="mobile-nav-grid" id="mobile-iframe-restaurants"></div>
    </div>
    <div class="mobile-section">
      <div class="mobile-section-title">🔗 External Links</div>
      <div class="mobile-nav-grid" id="mobile-external-restaurants"></div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="closeMobileMenu()"></div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Home Page -->
    <div class="home-page active" id="home-page">
      <div class="home-content">
        <div class="welcome-section">
          <h1>🍽️ Restaurant Hub</h1>
          <p>Browse daily menus from nearby restaurants. Click on any restaurant to view their menu.</p>
        </div>

        <div class="section-title">
          <span class="icon">📋</span>
          Quick Preview Menus
        </div>
        <div class="restaurant-grid" id="home-iframe-restaurants"></div>

        <div class="section-title">
          <span class="icon">🔗</span>
          External Restaurant Links
        </div>
        <div class="restaurant-grid" id="home-external-restaurants"></div>

        <div style="text-align: center;">
          <a href="https://www.google.com/maps/search/Restaurants/@49.2006673,16.6053123,16.81z/data=!4m2!2m1!6e5?entry=ttu" 
             target="_blank" 
             rel="noopener noreferrer"
             class="map-link">
            📍 View All Restaurants on Google Maps
          </a>
        </div>
      </div>
    </div>

    <!-- Iframe Container -->
    <div class="iframe-container" id="iframe-container">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading menu...</div>
      </div>
      <iframe id="content-iframe" class="content-iframe" src="" title="Restaurant Menu"></iframe>
    </div>
  </main>

  <script>
    const THEME_KEY = 'restaurant-theme';
    const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
    const themeToggleButton = document.getElementById('theme-toggle');
    let currentTheme = null;

    function applyTheme(theme, persist = false) {
      currentTheme = theme;
      document.documentElement.setAttribute('data-theme', theme);
      if (themeToggleButton) {
        themeToggleButton.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
        themeToggleButton.setAttribute('aria-label', `Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`);
      }
      if (persist) {
        localStorage.setItem(THEME_KEY, theme);
      }
    }

    function loadPreferredTheme() {
      const stored = localStorage.getItem(THEME_KEY);
      return stored ? stored : (prefersDarkScheme.matches ? 'dark' : 'light');
    }

    const initialTheme = loadPreferredTheme();
    applyTheme(initialTheme, false);

    themeToggleButton?.addEventListener('click', () => {
      const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyTheme(nextTheme, true);
    });

    const handleSystemThemeChange = (event) => {
      if (!localStorage.getItem(THEME_KEY)) {
        applyTheme(event.matches ? 'dark' : 'light', false);
      }
    };

    if (prefersDarkScheme.addEventListener) {
      prefersDarkScheme.addEventListener('change', handleSystemThemeChange);
    } else if (prefersDarkScheme.addListener) {
      prefersDarkScheme.addListener(handleSystemThemeChange);
    }

    // Restaurant data
    const iframeSites = [
      { name: 'Teátr', link: 'https://www.restaurant-teatr.cz/denni-menu.php' },
      { name: 'Sabaidy', link: 'https://www.menicka.cz/api/iframe/?id=3903' },
      { name: 'EFI Pivovar', link: 'https://www.efihostinec.cz/osmec/poledni-menu/' },
      { name: 'Jean Pauls', link: 'https://www.menicka.cz/api/iframe/?id=3884' },
      { name: 'Lužánka', link: 'https://luzankabrno.cz/poledni-menu/' },
      { name: 'Caruso', link: 'https://www.carusorestaurant.cz/denni-obedove-menu/' },
      { name: 'Suzies', link: 'https://www.menicka.cz/api/iframe/?id=3830' },
      { name: 'První Doubravnická', link: 'https://www.menicka.cz/api/iframe/?id=4948' },
    ];

    const externalSites = [
      { name: 'Chutné štěstí', link: 'https://chutnestesti.cz/cs/' },
      { name: 'Gopál', link: 'https://www.gopal.menu/restaurant' },
      { name: 'Garden Food', link: 'https://www.gardenfoodconcept.cz/poledni-menu/' },
      { name: 'Re Brno', link: 'https://rebrno.cz/launchmenuCZ/White%20Black%20Simple%20Restaurant%20Menu%20(12).pdf-1724387239051.pdf' },
      { name: 'San Giacomo', link: 'https://www.sangiacomo.cz/en/menu' },
      { name: 'U Semináru', link: 'http://www.useminaru.cz/menu.php' },
      { name: 'India Thali', link: 'https://www.indiathali.cz/' },
      { name: 'Tao', link: 'https://www.taorestaurant.cz/tydenni_menu/nabidka/' },
    ];

    let currentSite = null;
    let mobileMenuOpen = false;

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      buildNavigation();
      buildHomePage();
      
      // Handle iframe load
      const iframe = document.getElementById('content-iframe');
      iframe.addEventListener('load', function() {
        document.getElementById('loading').classList.remove('show');
      });
    });

    function buildNavigation() {
      const navTabs = document.getElementById('nav-tabs');
      const mobileIframe = document.getElementById('mobile-iframe-restaurants');
      const mobileExternal = document.getElementById('mobile-external-restaurants');

      // Home button
      navTabs.innerHTML = `<button class="nav-btn active" id="nav-home" onclick="showHome()">🏠 Home</button>`;
      
      // Add iframe sites to nav
      iframeSites.forEach((site, i) => {
        navTabs.innerHTML += `<button class="nav-btn" id="nav-iframe-${i}" onclick="loadIframe(${i})">${site.name}</button>`;
        mobileIframe.innerHTML += `<button class="mobile-nav-btn" id="mobile-iframe-${i}" onclick="loadIframe(${i})">${site.name}</button>`;
      });

      // Add external sites to nav (with badge)
      externalSites.forEach((site, i) => {
        navTabs.innerHTML += `<a href="${site.link}" target="_blank" rel="noopener noreferrer" class="nav-btn external">${site.name} <span class="badge">↗</span></a>`;
        mobileExternal.innerHTML += `<a href="${site.link}" target="_blank" rel="noopener noreferrer" class="mobile-nav-btn external">${site.name} ↗</a>`;
      });
    }

    function buildHomePage() {
      const homeIframe = document.getElementById('home-iframe-restaurants');
      const homeExternal = document.getElementById('home-external-restaurants');

      iframeSites.forEach((site, i) => {
        homeIframe.innerHTML += `
          <div class="restaurant-card" onclick="loadIframe(${i})">
            <div class="name">${site.name}</div>
            <div class="badge">Quick View</div>
          </div>
        `;
      });

      externalSites.forEach((site, i) => {
        homeExternal.innerHTML += `
          <a href="${site.link}" target="_blank" rel="noopener noreferrer" class="restaurant-card external" style="text-decoration: none;">
            <div class="name">${site.name}</div>
            <div class="badge">Opens in new tab ↗</div>
          </a>
        `;
      });
    }

    function showHome() {
      currentSite = null;
      closeMobileMenu();
      
      // Update UI
      document.getElementById('home-page').classList.add('active');
      document.getElementById('iframe-container').classList.remove('active');
      
      // Update nav
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('nav-home').classList.add('active');
    }

    function loadIframe(index) {
      currentSite = index;
      closeMobileMenu();
      
      const site = iframeSites[index];
      const iframe = document.getElementById('content-iframe');
      
      // Show loading
      document.getElementById('loading').classList.add('show');
      
      // Update UI
      document.getElementById('home-page').classList.remove('active');
      document.getElementById('iframe-container').classList.add('active');
      
      // Load iframe
      iframe.src = site.link;
      
      // Update nav
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
      
      const navBtn = document.getElementById(`nav-iframe-${index}`);
      const mobileBtn = document.getElementById(`mobile-iframe-${index}`);
      if (navBtn) navBtn.classList.add('active');
      if (mobileBtn) mobileBtn.classList.add('active');
    }

    function toggleMobileMenu() {
      mobileMenuOpen = !mobileMenuOpen;
      document.getElementById('mobile-dropdown').classList.toggle('show', mobileMenuOpen);
      document.getElementById('overlay').classList.toggle('show', mobileMenuOpen);
      document.getElementById('menu-toggle-text').textContent = mobileMenuOpen ? '✕ Close' : '☰ Menu';
    }

    function closeMobileMenu() {
      mobileMenuOpen = false;
      document.getElementById('mobile-dropdown').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('menu-toggle-text').textContent = '☰ Menu';
    }

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/restaurant/sw.js').then(function(registration) {
          console.log('ServiceWorker registration successful with scope: ', registration.scope);
        }, function(err) {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
</body>

</html>
